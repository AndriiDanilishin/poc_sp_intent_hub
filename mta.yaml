_schema-version: "3.1"
ID: ai-sourcing-poc
version: 1.0.0
description: "Intent Hub."

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --omit=optional
        - npx cds build --production
        - npm install --prefix app/sourcing-requests
        - npm run build --prefix app/sourcing-requests
        - rm -rf approuter/resources
        - mkdir -p approuter/resources
        - cp -r app/sourcing-requests/dist/. approuter/resources/

modules:

  - name: srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      ignore:
        - "node_modules/"
    requires:
      - name: xsuaa
      - name: destination
      - name: poc_sp_intent_hub-db
    provides:
      - name: srv-api
        properties:
          url: ${default-url}

  - name: approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 512M
    build-parameters:
      ignore:
        - "node_modules/"
    requires:
      - name: xsuaa
      - name: destination
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{url}
          forwardAuthToken: true

  - name: poc_sp_intent_hub-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 512M
      disk-quota: 512M
    build-parameters:
      ignore:
        - "node_modules/"
    requires:
      - name: poc_sp_intent_hub-db

resources:

  - name: xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: poc_sp_intent_hub-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
      config:
        database_id: 034adae1-0899-466b-b92b-77e41992a5c3
